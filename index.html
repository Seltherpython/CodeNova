<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Primary Meta Tags -->
    <title>Repodata AI | Free GitHub Repository Ingestion for AI Agents</title>
    <meta name="title" content="Repodata AI | Free GitHub Repository Ingestion for AI Agents" />
    <meta name="description" content="Free and open-source: transform any GitHub repository into LLM-ready datasets. The ultimate ingestion protocol for agentic coding. Fast and accurate." />
    <meta name="keywords" content="AI, LLM, Repository Ingestion, Agentic Coding, GitHub Data, Code Analysis, Open Source, Free, Gemini" />
    <meta name="author" content="Repodata AI" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://repodata.ai/" />
    <meta property="og:title" content="Repodata AI | High-Fidelity Repository Ingestion" />
    <meta property="og:description" content="Transform repositories into agent-ready datasets instantly. High-fidelity ingestion for modern AI workflows." />
    <meta property="og:image" content="https://repodata.ai/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://repodata.ai/" />
    <meta property="twitter:title" content="Repodata AI | High-Fidelity Repository Ingestion" />
    <meta property="twitter:description" content="The ingestion protocol for modern repository intelligence. Build datasets from code in seconds." />
    <meta property="twitter:image" content="https://repodata.ai/og-image.png" />

    <!-- Performance & Speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    
    <link rel="canonical" href="https://repodata.ai/" />
    <meta name="robots" content="index, follow" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Repodata AI",
        "description": "High-fidelity repository ingestion protocol for AI agents.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "author": {
          "@type": "Organization",
          "name": "Repodata AI"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body class="bg-black">
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; font-family: system-ui, -apple-system, sans-serif;">
        <div style="width: 48px; height: 48px; background: black; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#76F1BC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        </div>
        <div style="font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; color: #d4d4d8;">Protocol Node Booting</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
