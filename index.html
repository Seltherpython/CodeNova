<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Primary Meta Tags -->
    <title>Repo Trace | Professional GitHub Repository Analysis</title>
    <meta name="title" content="Repo Trace | Professional GitHub Repository Analysis" />
    <meta name="description" content="High-fidelity repository ingestion protocol for AI agents. Transform any GitHub repository into LLM-ready context instantly." />
    <meta name="keywords" content="AI, LLM, Repository Ingestion, Agentic Coding, GitHub Data, Code Analysis, Open Source, Free, Gemini" />
    <meta name="author" content="Repo Trace" />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://repotrace.vercel.app/" />
    <meta property="og:title" content="Repo Trace | High-Fidelity Repository Analysis" />
    <meta property="og:description" content="Transform repositories into agent-ready datasets instantly. High-fidelity ingestion for modern AI workflows." />
    <meta property="og:image" content="https://repotrace.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://repotrace.vercel.app/" />
    <meta property="twitter:title" content="Repo Trace | High-Fidelity Repository Analysis" />
    <meta property="twitter:description" content="The ingestion protocol for modern repository intelligence. Build datasets from code in seconds." />
    <meta property="twitter:image" content="https://repotrace.vercel.app/og-image.png" />

    <!-- Performance & Speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    
    <link rel="canonical" href="https://repotrace.vercel.app/" />
    <meta name="robots" content="index, follow" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Repo Trace",
        "description": "High-fidelity repository ingestion protocol for AI agents.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "author": {
          "@type": "Organization",
          "name": "Repo Trace"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body class="bg-black">
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: black; font-family: 'Outfit', system-ui, -apple-system, sans-serif;">
        <div style="width: 48px; height: 48px; background: rgba(118, 241, 188, 0.1); border: 1px solid rgba(118, 241, 188, 0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#76F1BC" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 8l8-4 8 4v8l-8 4-8-4V8z" />
            <path d="M4 8l8 4 8-4" />
            <path d="M12 12v8" />
            <path d="M9 13l2 2-2 2-2-2 2-2z" fill="#76F1BC" stroke="none" />
            <path d="M15 13l2 2-2 2-2-2 2-2z" fill="#76F1BC" stroke="none" />
          </svg>
        </div>
        <div style="font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.4em; color: #76F1BC; animation: pulse 2s infinite;">Initializing v1 (Beta)</div>
        <style>
          @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
          }
          body { margin: 0; padding: 0; }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
